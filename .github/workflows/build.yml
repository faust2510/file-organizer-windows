name: 打包 Windows 安装包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 确定版本号
      id: version
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        else
          VERSION="$(date +'%Y%m%d').$(echo ${{ github.run_number }})"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "📌 版本号: $VERSION"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install flet send2trash pillow pyinstaller

    - name: 使用 flet pack 打包 exe（目录模式）
      run: |
        flet pack main_flet.py --name "妈妈文件整理助手" --onedir --add-data "config.py;." --add-data "organizer.py;." --add-data "search.py;." --add-data "gui_flet.py;."

    - name: 添加启动脚本
      shell: pwsh
      run: |
        $exeDir = "dist\妈妈文件整理助手"
        @"
        @echo off
        cd /d "%~dp0"
        start "" "妈妈文件整理助手.exe"
        "@ | Out-File -FilePath "$exeDir\启动.bat" -Encoding ascii

    - name: 安装 Inno Setup 并配置中文语言
      shell: pwsh
      run: |
        choco install innosetup -y
        $isccPath = "C:\Program Files (x86)\Inno Setup 6"
        $langUrl = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
        $langFile = "$isccPath\Languages\ChineseSimplified.isl"
        New-Item -ItemType Directory -Force -Path "$isccPath\Languages"
        Invoke-WebRequest -Uri $langUrl -OutFile $langFile
        Write-Host "✅ 中文语言文件已下载到: $langFile"

    - name: 打包安装程序
      shell: pwsh
      run: |
        iscc setup.iss /DMyAppVersion="${{ steps.version.outputs.version }}"

    - name: 压缩为 zip
      shell: pwsh
      run: |
        $zipName = "妈妈文件整理助手-Windows-v${{ steps.version.outputs.version }}.zip"
        Compress-Archive -Path "dist\妈妈文件整理助手\*" -DestinationPath $zipName
        echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV
        echo "📦 已创建: $zipName"

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: 妈妈文件整理助手-Windows
        path: 妈妈文件整理助手-Windows-v*.zip
        retention-days: 30

    - name: 创建 GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "妈妈文件整理助手-v${{ steps.version.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        generate_release_notes: false
        body: |
          ## 妈妈文件整理助手 v${{ steps.version.outputs.version }}

          一键整理电脑文件，自动分类到对应文件夹。

          ### 下载使用

          **方式一：安装包（推荐）**
          1. 下载 `妈妈文件整理助手-Setup-${{ steps.version.outputs.version }}.exe`
          2. 双击运行，一路点"下一步"
          3. 桌面出现图标，双击就能用！

          **方式二：便携版**
          1. 下载 `妈妈文件整理助手-Windows-v${{ steps.version.outputs.version }}.zip`
          2. 解压到任意文件夹
          3. 双击 `妈妈文件整理助手.exe` 即可运行

          ### 功能说明

          - 选择任意文件夹进行整理
          - 按文件类型自动细分分类（Word/PDF/Excel/图片/视频/音乐/压缩包等）
          - 整理前预览，确认后执行
          - 一键撤销功能，误操作可回退
          - 全中文界面，大字体大按钮

          ### 注意事项

          - 首次运行可能需要等待几秒加载
          - 如果 Windows 提示"未知发布者"，点击"仍要运行"即可
        files: |
          ${{ env.ZIP_PATH }}
          installer_output/妈妈文件整理助手-Setup-*.exe

name: 打包 Windows 安装包

on:
  push:
    tags:
      - 'v*'          # 推送 v 开头的 tag 时触发，例如 v1.0.0
  workflow_dispatch:   # 允许手动触发（Actions 页面点 Run）

permissions:
  contents: write      # 需要写权限来创建 Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 确定版本号
      id: version
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          # 从 tag 提取版本号，例如 v1.2.3 -> 1.2.3
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        else
          # 手动触发时，用日期作为版本号
          VERSION="$(date +'%Y%m%d').$(echo ${{ github.run_number }})"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "📌 版本号: $VERSION"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install flet send2trash pyinstaller

    - name: 打包 exe
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "妈妈文件整理助手" --add-data "config.py;." --add-data "organizer.py;." --add-data "search.py;." --add-data "gui_flet.py;." main_flet.py

    - name: 添加启动脚本
      shell: pwsh
      run: |
        $exeDir = "dist\妈妈文件整理助手"
        # 创建启动 bat，方便双击运行
        @"
        @echo off
        cd /d "%~dp0"
        start "" "妈妈文件整理助手.exe"
        "@ | Out-File -FilePath "$exeDir\启动.bat" -Encoding ascii

    - name: 安装 Inno Setup
      run: choco install innosetup -y

    - name: 打包安装程序
      shell: pwsh
      run: |
        # 创建单文件 exe 用于安装包
        pyinstaller --noconfirm --onefile --windowed --name "妈妈文件整理助手" --add-data "config.py;." --add-data "organizer.py;." --add-data "search.py;." --add-data "gui_flet.py;." main_flet.py
        Copy-Item "dist\妈妈文件整理助手.exe" -Destination "dist\妈妈文件整理助手\妈妈文件整理助手.exe"
        # 运行 Inno Setup
        iscc setup.iss /DMyAppVersion="${{ steps.version.outputs.version }}"

    - name: 压缩为 zip
      shell: pwsh
      run: |
        $zipName = "妈妈文件整理助手-Windows-v${{ steps.version.outputs.version }}.zip"
        Compress-Archive -Path "dist\妈妈文件整理助手\*" -DestinationPath $zipName
        echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV
        echo "📦 已创建: $zipName"

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: 妈妈文件整理助手-Windows
        path: 妈妈文件整理助手-Windows-v*.zip
        retention-days: 30

    - name: 创建 GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "妈妈文件整理助手-v${{ steps.version.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        generate_release_notes: false
        body: |
          ## 妈妈文件整理助手 v${{ steps.version.outputs.version }}

          一键整理电脑文件，自动分类到对应文件夹。

          ### 下载使用

          1. 点击下方 **妈妈文件整理助手-Windows-v${{ steps.version.outputs.version }}.zip** 下载
          2. 解压到任意文件夹（建议放桌面或 D 盘）
          3. 双击 `妈妈文件整理助手.exe` 即可运行
          4. 也可以双击 `启动.bat` 运行

          ### 功能说明

          - 自动扫描桌面、下载、文档三个文件夹
          - 按文件类型自动分类（文档、图片、视频、音乐、压缩包等）
          - 支持自定义分类规则
          - 整理后的文件统一存放在 `~/OrganizedFiles/` 目录

          ### 注意事项

          - 首次运行可能需要等待几秒加载
          - 如果 Windows 提示"未知发布者"，点击"仍要运行"即可
          - 建议不要放在 C 盘系统目录下
        files: |
          ${{ env.ZIP_PATH }}
          installer_output/妈妈文件整理助手-Setup-*.exe
